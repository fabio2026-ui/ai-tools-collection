groups:
  - name: ai-tools-collection_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected in ai-tools-collection"
          description: "Error rate is { $value }. More than 5% of requests are failing."
      
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected in ai-tools-collection"
          description: "95th percentile latency is { $value } seconds."
      
      - alert: ServiceDown
        expr: up{job="ai-tools-collection"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service ai-tools-collection is down"
          description: "Service has been down for more than 1 minute."
      
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{container_label_com_docker_compose_service="ai-tools-collection"} / container_spec_memory_limit_bytes{container_label_com_docker_compose_service="ai-tools-collection"}) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in ai-tools-collection"
          description: "Memory usage is { $value }% of limit."
      
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_service="ai-tools-collection"}[5m]) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage in ai-tools-collection"
          description: "CPU usage is { $value } cores."
      
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk space is less than 20% available."
      
      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 1000
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "High request rate in ai-tools-collection"
          description: "Request rate is { $value } requests per second."
