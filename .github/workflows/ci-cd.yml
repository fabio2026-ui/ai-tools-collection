name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check file structure
      run: |
        echo "📁 Repository structure:"
        find . -type f -name "*.py" -o -name "*.md" -o -name "*.json" | head -20
        echo ""
        echo "📊 File count:"
        find . -type f | wc -l
    
    - name: Validate files
      run: |
        echo "🔍 Validating files..."
        # 检查Python文件语法
        for file in $(find . -name "*.py"); do
          echo "Checking $file"
          python3 -m py_compile "$file" 2>/dev/null || echo "⚠️  Syntax error in $file"
        done
        
        # 检查JSON文件
        for file in $(find . -name "*.json"); do
          echo "Checking $file"
          python3 -m json.tool "$file" > /dev/null 2>&1 || echo "⚠️  Invalid JSON in $file"
        done
    
    - name: Create deployment package
      run: |
        echo "📦 Creating deployment package..."
        mkdir -p dist
        tar -czf dist/deployment-$(date +%Y%m%d-%H%M%S).tar.gz .
        echo "✅ Package created"
    
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy status
      run: |
        echo "🚀 Deployment started"
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo "✅ Deployment successful"
