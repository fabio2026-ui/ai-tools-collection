version: '3.8'

services:
  ai-tools-collection:
    build: .
    container_name: ai-tools-collection
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    
  # 备份服务
  backup:
    image: alpine:latest
    container_name: ai-tools-collection-backup
    volumes:
      - ./backup:/backup
      - ai-tools-collection_data:/app/data:ro
    command: >
      sh -c "
        echo 'Starting backup...' &&
        cd /backup &&
        python backup.py &&
        echo 'Backup completed'
      "
    networks:
      - ai-tools-collection-network
    restart: "no"  # 手动触发或通过cron触发

  # 安全扫描服务
  security-scan:
    image: aquasec/trivy:latest
    container_name: ai-tools-collection-security-scan
    volumes:
      - ./security:/security
    command: >
      sh -c "
        echo 'Starting security scan...' &&
        trivy image ai-tools-collection:latest &&
        echo 'Security scan completed'
      "
    networks:
      - ai-tools-collection-network
    restart: "no"  # 手动触发或通过cron触发

volumes:
      - ./data:/app/data
    
  # 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    