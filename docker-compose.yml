version: '3.8'

services:
  ai-tools-collection:
    build: .
    container_name: ai-tools-collection
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    volumes:
      - ./data:/app/data
    networks:
      - ai-tools-collection-network

networks:
  ai-tools-collection-network:
    driver: bridge
